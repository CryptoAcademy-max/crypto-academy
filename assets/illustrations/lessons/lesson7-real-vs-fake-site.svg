<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Real versus fake site mock browser</title>
  <desc id="desc">An original browser mockup comparing a safer source check and a suspicious source check.</desc>
  <defs>
    <linearGradient id="safeBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f1f8f4"/>
      <stop offset="1" stop-color="#e8f2eb"/>
    </linearGradient>
    <linearGradient id="riskBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbf3f1"/>
      <stop offset="1" stop-color="#f6e8e4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#18324d" flood-opacity=".10"/>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="28" fill="#eef4fb"/>
