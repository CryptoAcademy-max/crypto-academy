      <rect x="56" y="148" width="182" height="18" rx="9" fill="#355b83" opacity=".88"/>
      <rect x="56" y="182" width="340" height="116" rx="22" fill="#f3f8fc" stroke="#dde7f0"/>
      <rect x="78" y="208" width="112" height="12" rx="6" fill="#8ca7c2"/>
