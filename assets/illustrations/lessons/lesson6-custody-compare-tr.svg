<svg width="1000" height="420" viewBox="0 0 1000 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFD"/>
      <stop offset="1" stop-color="#F8F1E7"/>
    </linearGradient>
    <filter id="softShadow" x="-20" y="-20" width="1040" height="560" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#182A45" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1000" height="420" rx="32" fill="url(#bg)"/>
  <text x="48" y="56" fill="#233146" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Varlık nerede durmalı?</text>
  <text x="48" y="86" fill="#5E6F82" font-family="Inter, Arial, sans-serif" font-size="17">Kolaylık, kontrol ve kurtarma sorumluluğunu karşılaştır.</text>
  <g filter="url(#softShadow)"><rect x="58" y="120" width="390" height="250" rx="24" fill="#FFFFFF"/></g>
  <rect x="90" y="150" width="160" height="32" rx="16" fill="#EAF3FF"/><text x="112" y="171" fill="#355B88" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Borsa bakiyesi</text>
  <text x="90" y="220" fill="#1F2B40" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Borsa saklaması</text><text x="90" y="250" fill="#617185" font-family="Inter, Arial, sans-serif" font-size="16">Hızlı erişim ve hesap kurtarma.</text>
  <rect x="90" y="276" width="326" height="36" rx="14" fill="#F6F9FD"/><text x="112" y="299" fill="#223045" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Hızlı al/sat erişimi</text>
  <rect x="90" y="324" width="326" height="36" rx="14" fill="#FFF4E8"/><text x="112" y="347" fill="#6D541F" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Daha az doğrudan kontrol</text>
  <g filter="url(#softShadow)"><rect x="552" y="120" width="390" height="250" rx="24" fill="#FFFFFF"/></g>
  <rect x="584" y="150" width="156" height="32" rx="16" fill="#EDF5EE"/><text x="606" y="171" fill="#2D6B49" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Kişisel cüzdan</text>
  <text x="584" y="220" fill="#1F2B40" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Kendi saklama</text><text x="584" y="250" fill="#617185" font-family="Inter, Arial, sans-serif" font-size="16">Daha çok kontrol, daha çok sorumluluk.</text>
  <rect x="584" y="276" width="326" height="36" rx="14" fill="#F3FAF4"/><text x="606" y="299" fill="#223045" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Doğrudan varlık kontrolü</text>
  <rect x="584" y="324" width="326" height="36" rx="14" fill="#FFF4E8"/><text x="606" y="347" fill="#6D541F" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Seed phrase koruması</text>
</svg>
