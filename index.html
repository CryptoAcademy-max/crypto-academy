}

function renderRichCoinCard(item){
  var c = item.coin;
  var l = item.labels;
  var catClass = c.category === 'stablecoin' ? ' stablecoin' : c.category === 'defi' ? ' defi' : c.category === 'nft' ? ' nft' : '';
  var html = '<div class="coin-card">';
  html += '<div class="coin-card-header"><div class="coin-badge'+catClass+'">'+c.symbol.substring(0,3)+'</div>';
  html += '<div><div class="coin-name">'+c.name+'</div><div class="coin-symbol">'+c.symbol+'</div></div></div>';
  html += '<div class="coin-card-body">';

  var fields = [
    ['overview', c.overview], ['role', c.role], ['strengths', c.strengths], ['limitations', c.limitations]
  ];
  fields.forEach(function(f){
    if(f[1]) html += '<div class="coin-field"><div class="coin-field-label">'+l[f[0]]+'</div><div class="coin-field-value">'+f[1]+'</div></div>';
  });

  if(c.beginnerNote){
    html += '<div class="coin-note"><strong>💡 '+l.beginnerNote+'</strong><br>'+c.beginnerNote+'</div>';
  }

  // Related sections
  var related = getRepresentativeCoinRelatedSections(item.coinKey, l) || [];
  if(!related.length){
    if(c.relatedLessons && c.relatedLessons.length) related.push({label:l.relatedLessons, items:getLocalizedRelatedLessonTitles(c.relatedLessons), page:'lessons'});
    if(c.relatedGlossary && c.relatedGlossary.length) related.push({label:l.relatedGlossary, items:c.relatedGlossary, page:'glossary'});
    if(c.relatedFaq && c.relatedFaq.length) related.push({label:l.relatedFaq, items:c.relatedFaq, page:'faq'});
    if(c.relatedSources && c.relatedSources.length) related.push({label:l.relatedSources, items:c.relatedSources, page:'sources'});
    if(c.relatedSafety && c.relatedSafety.length) related.push({label:l.relatedSafety, items:c.relatedSafety, page:'safety'});
  }

  if(related.length){
    related.forEach(function(r){
      html += '<div style="margin-top:8px"><div class="coin-field-label">'+r.label+'</div><div class="coin-related">';
      r.items.forEach(function(item){
        if(item && typeof item === 'object'){
          html += '<span class="coin-related-chip" data-page="'+(item.targetPage || r.page)+'" data-target-type="'+(item.targetType || '')+'" data-target-id="'+(item.targetId || '')+'">'+item.label+'</span>';
        } else {
          html += '<span class="coin-related-chip" data-page="'+r.page+'">'+item+'</span>';
        }
      });
      html += '</div></div>';
    });
  }

  html += '</div></div>';
  return html;
}

// Render lightweight coin card
function renderLightCoinCard(item){
  var l = item.labels;
  var html = '<div class="coin-light">';
  html += '<div class="coin-card-header"><div class="coin-badge">'+item.symbol.substring(0,3)+'</div>';
  html += '<div><div class="coin-name">'+item.name+'</div><div class="coin-symbol">'+item.symbol+'</div></div></div>';
  if(item.desc) html += '<div class="coin-intro">'+item.desc+'</div>';
  html += '</div>';
  return html;
}

function repBaseLang(lang){
  return lang === 'br' ? 'pt' : lang;
}

function repNormalizeText(text){
  return String(text || '').toLowerCase().replace(/\s+/g, ' ').trim();
}

function getRepresentativeTargetLabel(targetType, targetId){
  var lang = (typeof currentLang !== 'undefined') ? currentLang : 'en';
  var base = repBaseLang(lang);
  if(targetType === 'lesson' && window.__repLessonTitle){
    return window.__repLessonTitle(lang, parseInt(targetId, 10));
  }
  if(targetType === 'glossary' && window.__repGlossaryEntries){
    var glossaryStore = window.__repGlossaryEntries[base] || window.__repGlossaryEntries.en;
    return glossaryStore && glossaryStore[targetId] ? glossaryStore[targetId].title : '';
  }
  if(targetType === 'faq' && window.__repFaqEntries){
    var faqStore = window.__repFaqEntries[base] || window.__repFaqEntries.en;
    return faqStore && faqStore[targetId] ? faqStore[targetId].title : '';
  }
  if(targetType === 'source' && window.__repSourceEntries){
    var sourceStore = window.__repSourceEntries[base] || window.__repSourceEntries.en;
    return sourceStore && sourceStore[targetId] ? sourceStore[targetId][2] : '';
  }
  if(targetType === 'safety' && window.__repSafetyEntries){
    var safetyStore = window.__repSafetyEntries[base] || window.__repSafetyEntries.en;
    return safetyStore && safetyStore[targetId] ? safetyStore[targetId].title : '';
  }
  return '';
}

function getRepresentativeScrollOffset(){
  var topbar = document.getElementById('topbar');
  var topbarHeight = topbar ? topbar.offsetHeight : 0;
  return topbarHeight + (window.innerWidth <= 640 ? 18 : 24);
}

function scrollRepresentativeTargetIntoView(el, align){
  if(!el) return;
  var rect = el.getBoundingClientRect();
  var elementHeight = rect.height || el.offsetHeight || 0;
  var offset = getRepresentativeScrollOffset();
  var top = rect.top + window.pageYOffset - offset;
  if(align === 'center' && window.innerWidth > 640){
    top = rect.top + window.pageYOffset - Math.max((window.innerHeight - elementHeight) / 2, offset);
  }
  window.scrollTo({ top: Math.max(top, 0), behavior:'smooth' });
}

function setActiveSourceCategory(targetCat){
  document.querySelectorAll('#sourcesPanel .source-cat[data-source-cat]').forEach(function(chip){
    chip.classList.toggle('is-active', chip.dataset.sourceCat === targetCat);
  });
}

function highlightRepresentativeTarget(el){
  if(!el) return;
  var oldTransition = el.style.transition;
  var oldBoxShadow = el.style.boxShadow;
  var oldBackground = el.style.backgroundColor;
  var oldBorderRadius = el.style.borderRadius;
  el.style.transition = 'box-shadow .25s ease, background-color .25s ease';
  el.style.boxShadow = '0 0 0 3px rgba(199,171,84,.45)';
  el.style.backgroundColor = 'rgba(199,171,84,.12)';
  el.style.borderRadius = '14px';
  setTimeout(function(){
    el.style.boxShadow = oldBoxShadow;
    el.style.backgroundColor = oldBackground;
    el.style.borderRadius = oldBorderRadius;
    el.style.transition = oldTransition;
  }, 1800);
}

function scrollToRepresentativeTarget(page, targetType, targetId){
  var panelMap = { glossary:'#glossaryPanel', faq:'#faqPanel', sources:'#sourcesPanel', safety:'#safetyPanel' };
  var panelSelector = panelMap[page];
  if(!panelSelector) return;
  if(targetType === 'source'){
    function findSourceTarget(){
      return document.querySelector(panelSelector + ' .source-library-item[data-source-key="' + targetId + '"]');
    }
    function revealSourceTarget(tries){
      var targetEl = findSourceTarget();
      if(targetEl){
        var sourceSection = targetEl.closest('.src-section-block');
        if(sourceSection && sourceSection.dataset.sourceSection) setActiveSourceCategory(sourceSection.dataset.sourceSection);
        scrollRepresentativeTargetIntoView(targetEl, 'center');
        highlightRepresentativeTarget(targetEl);
        return;
      }
      if(tries > 0){
        setTimeout(function(){ revealSourceTarget(tries - 1); }, 120);
      }
    }
    revealSourceTarget(10);
    return;
  }
  var targetLabel = repNormalizeText(getRepresentativeTargetLabel(targetType, targetId));
  if(!targetLabel) return;

  function findTargetElement(){
    var cards = [];
    if(targetType === 'glossary') cards = Array.prototype.slice.call(document.querySelectorAll(panelSelector + ' .glossary-card'));
    if(targetType === 'faq') cards = Array.prototype.slice.call(document.querySelectorAll(panelSelector + ' .faq-item'));
    if(targetType === 'source') cards = Array.prototype.slice.call(document.querySelectorAll(panelSelector + ' .source-library-item'));
    if(targetType === 'safety') cards = Array.prototype.slice.call(document.querySelectorAll(panelSelector + ' .mistake-card'));
    var targetEl = null;
    cards.some(function(card){
      var textEl = null;
      if(targetType === 'glossary') textEl = card.querySelector('.glossary-term');
      if(targetType === 'faq') textEl = card.querySelector('.faq-q');
      if(targetType === 'source') textEl = card.querySelector('h3');
      if(targetType === 'safety') textEl = card.querySelector('.mistake-label');
      if(textEl && repNormalizeText(textEl.textContent) === targetLabel){
        targetEl = card;
        return true;
      }
      return false;
    });
    return targetEl;
  }

  function revealTarget(tries){
    var targetEl = findTargetElement();
    if(targetEl){
      if(page === 'sources'){
        var sourceSection = targetEl.closest('.src-section-block');
        if(sourceSection && sourceSection.dataset.sourceSection) setActiveSourceCategory(sourceSection.dataset.sourceSection);
      }
      scrollRepresentativeTargetIntoView(targetEl, 'center');
      highlightRepresentativeTarget(targetEl);
      return;
    }
    if(tries > 0){
      setTimeout(function(){ revealTarget(tries - 1); }, 120);
    }
  }

  revealTarget(10);
}

function scrollToSourceSection(targetCat){
  if(typeof showPage === 'function') showPage('sources');
  setActiveSourceCategory(targetCat);
  function revealSection(tries){
    var targetEl = document.querySelector('#sourcesPanel .src-section-block[data-source-section="' + targetCat + '"]');
    if(targetEl){
      scrollRepresentativeTargetIntoView(targetEl, 'start');
      highlightRepresentativeTarget(targetEl);
      return;
    }
    if(tries > 0){
      setTimeout(function(){ revealSection(tries - 1); }, 120);
    }
  }
  revealSection(10);
}

function navigateRepresentativeChip(chip){
  var page = chip.dataset.page;
  var targetType = chip.dataset.targetType;
  var targetId = chip.dataset.targetId;
  if(!page) return;

  if(targetType === 'lesson' && typeof showLesson === 'function'){
    var lessonIndex = parseInt(targetId, 10);
    if(!isNaN(lessonIndex)){
      showLesson(lessonIndex);
      setTimeout(function(){
        var lessonPanel = document.getElementById('lesson' + lessonIndex);
        var lessonTarget = lessonPanel ? (lessonPanel.querySelector('.lc-header') || lessonPanel) : null;
        if(lessonTarget){
          scrollRepresentativeTargetIntoView(lessonTarget, 'start');
          highlightRepresentativeTarget(lessonTarget);
        }
      }, 120);
    }
    closeSearch();
    return;
  }

  if(typeof showPage === 'function'){
    showPage(page);
    closeSearch();
    setTimeout(function(){
      scrollToRepresentativeTarget(page, targetType, targetId);
    }, 120);
  }
}

// Override the search input handler
var searchInput = document.getElementById('searchInput');
var origInputHandler = null;

// Remove existing input listeners by cloning
var newSearchInput = searchInput.cloneNode(true);
searchInput.parentNode.replaceChild(newSearchInput, searchInput);

newSearchInput.addEventListener('input', function(){
  var q = this.value.trim().toLowerCase();
  var container = document.getElementById('searchResults');
  if(!q){ container.innerHTML = ''; return; }

  // Get internal items
  var internalItems = (typeof getSearchableItems === 'function') ? getSearchableItems() : [];
  var internalResults = internalItems.filter(function(item){
    return item.title.toLowerCase().indexOf(q) !== -1 || item.desc.toLowerCase().indexOf(q) !== -1;
  });

  // Get coin items
  var coinItems = getCoinSearchItems();
  var coinResults = coinItems.filter(function(item){
    return item.searchText.indexOf(q) !== -1;
  });

  if(internalResults.length === 0 && coinResults.length === 0){
    container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-3);font-size:.88rem">No results found</div>';
    return;
  }

  var lang = (typeof currentLang !== 'undefined') ? currentLang : 'en';
  var labels = (coinEducation[lang] && coinEducation[lang]._labels) || coinEducation.en._labels;
  var html = '';

  // Coin results first
  if(coinResults.length > 0){
    html += '<div class="search-section-divider">'+labels.coinResults+'</div>';
    coinResults.slice(0,5).forEach(function(item){
      if(item.type === 'coin-rich'){
        html += renderRichCoinCard(item);
      } else {
        html += renderLightCoinCard(item);
      }
    });
  }

  // Internal results
  if(internalResults.length > 0){
    if(coinResults.length > 0){
      html += '<div class="search-section-divider">'+labels.internalResults+'</div>';
    }
    internalResults.slice(0,10).forEach(function(r){
      html += '<div class="search-result-item" data-idx="'+internalItems.indexOf(r)+'"><div class="search-result-badge '+r.type+'">'+r.badge+'</div><div><div class="search-result-title">'+r.title+'</div><div class="search-result-desc">'+r.desc+'</div></div></div>';
    });
  }

  container.innerHTML = html;

  // Bind click on internal items
  container.querySelectorAll('.search-result-item').forEach(function(el){
    var idx = parseInt(el.dataset.idx);
    if(!isNaN(idx) && internalItems[idx]){
      el.addEventListener('click', function(){ internalItems[idx].action(); });
    }
  });

  // Bind click on related chips to navigate
  container.querySelectorAll('.coin-related-chip').forEach(function(chip){
    chip.addEventListener('click', function(){
      if(this.dataset.targetType && this.dataset.targetId){
        navigateRepresentativeChip(this);
        return;
      }
      var page = this.dataset.page;
      if(page && typeof showPage === 'function'){
        if(page === 'lessons' && typeof showLesson === 'function') showLesson(0);
        else showPage(page);
        closeSearch();
      }
    });
  });
});

// Make getSearchableItems globally accessible if it isn't already
if(typeof window.getSearchableItems === 'undefined' && typeof getSearchableItems === 'function'){
  window.getSearchableItems = getSearchableItems;
}

document.addEventListener('click', function(e){
  var sourceCat = e.target.closest('#sourcesPanel .source-cat[data-source-cat]');
  if(sourceCat){
    scrollToSourceSection(sourceCat.dataset.sourceCat);
    return;
  }

  var sourceCard = e.target.closest('#sourcesPanel .source-library-item[data-source-key]');
  if(sourceCard && !e.target.closest('a')){
    var sourceSection = sourceCard.closest('.src-section-block');
    if(sourceSection && sourceSection.dataset.sourceSection) setActiveSourceCategory(sourceSection.dataset.sourceSection);
    scrollRepresentativeTargetIntoView(sourceCard, 'center');
    highlightRepresentativeTarget(sourceCard);
  }
});

})();
</script>

      ['Bridge','A tool used to move assets or messages between different blockchains.']
    ];
    glossaryOverrides.ko = deepClone(koreanGlossaryFull);
  }

  window.__repCoinMappings = coinMappings;
  window.__repGlossaryEntries = glossaryEntries;
  window.__repFaqEntries = faqEntries;
  window.__repSourceEntries = sourceEntries;
  window.__repSafetyEntries = safetyEntries;
  window.__repLessonTitle = lessonTitle;

  REL_LANGS.forEach(function(lang){
    var base = baseLang(lang);
    var gLang = glossaryEntries[base];
    var fLang = faqEntries[base];
    var sLang = safetyEntries[base];
    var srcLang = sourceEntries[base];
    if(!gLang || !fLang || !sLang || !srcLang) return;

    if(typeof glossaryOverrides !== 'undefined'){
      var glossaryList = ensurePageLangStore(glossaryOverrides, lang, base);
      if(!glossaryList){
        glossaryOverrides[lang] = [];
        glossaryList = glossaryOverrides[lang];
      }
      Object.keys(gLang).forEach(function(key){
        ensureUnique(glossaryList, [gLang[key].title, gLang[key].body], 0);
      });
    }

    if(typeof sourceOverrides !== 'undefined'){
      if(!sourceOverrides[lang]){
        sourceOverrides[lang] = deepClone((sourceLibrary && (sourceLibrary[base] || sourceLibrary.en)) || []);
      }
      Object.keys(srcLang).forEach(function(key){
        ensureUnique(sourceOverrides[lang], localizedSourceEntry(lang, srcLang[key]), 2);
      });
    }

    if(typeof polishedSectionContent !== 'undefined'){
      var psc = ensurePageLangStore(polishedSectionContent, lang, base);
      if(psc){
        psc.faqItems = psc.faqItems || [];
        psc.safetyItems = psc.safetyItems || [];
        Object.keys(fLang).forEach(function(key){
          ensureUnique(psc.faqItems, [fLang[key].title, fLang[key].body], 0);
        });
        Object.keys(sLang).forEach(function(key){
          ensureUnique(psc.safetyItems, [sLang[key].title, sLang[key].body], 0);
        });
      }
    }

    if(typeof coinEducation !== 'undefined'){
      if(!coinEducation[lang] && coinEducation[base]) coinEducation[lang] = deepClone(coinEducation[base]);
      var ceLang = coinEducation[lang];
      if(!ceLang) return;

      Object.keys(coinMappings).forEach(function(coinKey){
        var coin = ceLang[coinKey];
        if(!coin) return;
        var mapping = coinMappings[coinKey];
        coin.relatedLessons = mapping.relatedLessons.map(function(idx){ return lessonTitle(lang, idx); });
        coin.relatedGlossary = mapping.relatedGlossary.map(function(id){ return gLang[id].title; });
        coin.relatedFaq = mapping.relatedFaq.map(function(id){ return fLang[id].title; });
        coin.relatedSources = mapping.relatedSources.map(function(id){ return srcLang[id][2]; });
        coin.relatedSafety = mapping.relatedSafety.map(function(id){ return sLang[id].title; });
      });

      if(ceLang.nft) ceLang.nft.name = 'ETH (NFT ecosystem)';
    }
  });

  if(typeof renderAllLessons === 'function') renderAllLessons();
  if(typeof showPage === 'function' && typeof currentPage !== 'undefined') showPage(currentPage || 'home');
})();
</script>
