<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crypto Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f4ef; --panel:#fffdfa; --sidebar:#efebe5; --line:rgba(36,31,24,.11); --line-strong:rgba(36,31,24,.20);
  --text:#1f1c18; --text-2:#4b4640; --text-3:#7b7369; --navy:#182a45; --navy-2:#264163; --gold:#98762f;
  --gold-bg:#f6edd8; --blue-bg:#eef3fa; --green-bg:#ebf5ef; --red-bg:#fbf0ef; --green:#2d6b49; --red:#8a3731;
  --shadow:0 1px 3px rgba(25,20,12,.08),0 10px 30px rgba(25,20,12,.06);
  --radius:10px; --radius-sm:8px; --sidebar-w:280px; --topbar-h:58px; --ease:cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{
  font-family:"Inter","Noto Sans KR","Noto Sans Thai",system-ui,sans-serif;
  background:var(--bg); color:var(--text); line-height:1.72; -webkit-font-smoothing:antialiased; min-height:100vh;
}
a{color:var(--navy-2)}
#topbar{
  position:fixed; inset:0 0 auto 0; height:var(--topbar-h); z-index:50; background:rgba(255,253,250,.88);
  backdrop-filter:blur(12px); border-bottom:1px solid var(--line); display:flex; align-items:center; gap:0;
}
.brand{
  width:var(--sidebar-w); height:100%; border-right:1px solid var(--line); display:flex; align-items:center; gap:12px;
  padding:0 18px; flex-shrink:0; text-decoration:none;
}
.brand-badge{width:30px;height:30px;border-radius:8px;background:var(--navy);display:grid;place-items:center;flex-shrink:0}
.brand-badge svg{width:16px;height:16px;stroke:#fff;stroke-width:1.8;fill:none}
.brand-title{font-size:.9rem;font-weight:700;color:var(--text);letter-spacing:-.01em}
.brand-sub{font-size:.7rem;color:var(--text-3)}
.topbar-center{flex:1;display:flex;align-items:center;padding:0 20px}
.breadcrumb{font-size:.8rem;color:var(--text-3)}
.topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto;padding-right:14px}
.progress-pill{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--sidebar);border:1px solid var(--line);border-radius:999px;font-size:.75rem;color:var(--text-2);font-weight:600}
.progress-dots{display:flex;gap:4px}
.progress-dot{width:6px;height:6px;border-radius:999px;background:var(--line-strong)}
.progress-dot.done{background:var(--green)}
.progress-dot.active{background:var(--navy)}
.lang-wrap{position:relative}
.lang-toggle{display:flex;align-items:center;gap:6px;padding:7px 10px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:.77rem;font-weight:600;color:var(--text-2);cursor:pointer}
.lang-toggle svg{width:12px;height:12px}
.lang-menu{display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--panel);border:1px solid var(--line-strong);border-radius:12px;box-shadow:var(--shadow);min-width:205px;overflow:hidden}
.lang-menu.open{display:block}
.lang-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;font-size:.82rem;color:var(--text-2)}
.lang-item:hover{background:var(--sidebar)}
.lang-item.active{color:var(--navy);font-weight:700}
.lang-item .native{margin-left:auto;font-size:.72rem;color:var(--text-3)}
.mobile-toggle{display:none;width:38px;height:38px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer}
.mobile-toggle span,.mobile-toggle span::before,.mobile-toggle span::after{display:block;width:16px;height:1.6px;background:var(--text-2);position:relative;margin:auto}
.mobile-toggle span::before,.mobile-toggle span::after{content:"";position:absolute;left:0}
.mobile-toggle span::before{top:-5px}.mobile-toggle span::after{top:5px}
#layout{display:flex;padding-top:var(--topbar-h);min-height:100vh}
#sidebar{
  width:var(--sidebar-w);position:fixed;left:0;top:var(--topbar-h);bottom:0;background:var(--sidebar);border-right:1px solid var(--line);
  display:flex;flex-direction:column;overflow:auto
}
.sidebar-section{padding:14px 12px 8px}
.sidebar-label{font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);font-weight:800;padding:0 6px 6px}
.lesson-nav-item{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:10px;border:1px solid transparent;cursor:pointer}
.lesson-nav-item:hover{background:rgba(24,42,69,.04)}
.lesson-nav-item.active{background:var(--panel);border-color:var(--line);box-shadow:0 1px 2px rgba(0,0,0,.04)}
.lesson-nav-item.done:not(.active) .nav-num{background:var(--green);color:#fff}
.nav-num{width:21px;height:21px;border-radius:50%;background:var(--line);display:grid;place-items:center;font-size:.66rem;font-family:"IBM Plex Mono",monospace;color:var(--text-3);font-weight:700;flex-shrink:0;margin-top:2px}
.lesson-nav-item.active .nav-num{background:var(--navy);color:#fff}
.nav-title{font-size:.83rem;font-weight:700;color:var(--text-2);line-height:1.3}
.lesson-nav-item.active .nav-title{color:var(--navy)}
.nav-sub{font-size:.72rem;color:var(--text-3);margin-top:2px}
.sidebar-divider{height:1px;background:var(--line);margin:8px 12px}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid var(--line);font-size:.7rem;color:var(--text-3);text-align:center}
#main{margin-left:var(--sidebar-w);flex:1;min-width:0}
.content-area{max-width:920px;padding:34px clamp(18px,5vw,64px) 72px}
.quickbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.quick-chip{font-size:.73rem;border:1px solid var(--line);background:#fff;padding:7px 11px;border-radius:999px;color:var(--text-2);font-weight:600}
.lesson-content{display:none;animation:fade .25s var(--ease)}
.lesson-content.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.lc-header{padding-bottom:22px;border-bottom:1px solid var(--line);margin-bottom:26px}
.lc-meta{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.meta-pill{font-family:"IBM Plex Mono",monospace;font-size:.68rem;padding:4px 8px;border-radius:6px;border:1px solid var(--line);background:var(--sidebar);color:var(--text-3);font-weight:600}
.meta-cat{font-family:"IBM Plex Mono",monospace;font-size:.68rem;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;font-weight:700}
.lc-title{font-size:clamp(1.48rem,3vw,2.05rem);line-height:1.18;letter-spacing:-.025em;font-weight:800;color:var(--text);margin-bottom:12px}
.lc-intro{font-size:1rem;color:var(--text-2);max-width:710px}
.callout{background:var(--gold-bg);border:1px solid rgba(152,118,47,.18);border-left:4px solid var(--gold);padding:14px 16px;border-radius:10px;margin:18px 0;font-size:.9rem;color:var(--text-2)}
.callout.info{background:var(--blue-bg);border-color:rgba(38,65,99,.15);border-left-color:var(--navy-2)}
.callout.warn{background:var(--red-bg);border-color:rgba(138,55,49,.16);border-left-color:var(--red)}
.callout.success{background:var(--green-bg);border-color:rgba(45,107,73,.16);border-left-color:var(--green)}
.lesson-body h2{font-size:1.12rem;font-weight:800;letter-spacing:-.01em;margin:28px 0 10px}
.lesson-body h3{font-family:"IBM Plex Mono",monospace;font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;margin:24px 0 8px;color:var(--text-3)}
.lesson-body p{font-size:.96rem;color:var(--text-2);margin-bottom:14px}
.lesson-body strong{color:var(--text);font-weight:800}
.visual{
  margin:18px 0 22px;border:1px solid var(--line);background:linear-gradient(180deg,#fff, #fbf8f3);border-radius:16px;padding:18px;box-shadow:0 1px 2px rgba(0,0,0,.04)
}
.visual-title{font-size:.78rem;font-family:"IBM Plex Mono",monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:10px}
.def-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:16px 0}
.def-block{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px}
.def-term{font-size:.74rem;font-family:"IBM Plex Mono",monospace;color:var(--navy);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:6px}
.def-body{font-size:.87rem;color:var(--text-2)}
.steps-list{display:flex;flex-direction:column;gap:10px;list-style:none;margin:16px 0}
.step-item{display:flex;gap:14px;padding:14px 16px;background:#fff;border:1px solid var(--line);border-radius:12px}
.step-n{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:var(--navy);color:#fff;font-family:"IBM Plex Mono",monospace;font-size:.72rem;flex-shrink:0;margin-top:3px}
.step-title{font-size:.9rem;font-weight:800;color:var(--text);margin-bottom:4px}
.step-desc{font-size:.84rem;color:var(--text-2)}
.example-card,.mistake-card,.faq-item,.checkpoint-item,.quiz-card,.source-card{
  background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0
}
.example-label,.mistake-label,.faq-q,.quiz-q,.source-label{font-family:"IBM Plex Mono",monospace;font-size:.74rem;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);font-weight:700;margin-bottom:6px}
.faq-a,.quiz-a,.source-body,.example-body,.mistake-body{font-size:.88rem;color:var(--text-2)}
.checkpoint-list{display:flex;flex-direction:column;gap:10px;margin:12px 0}
.checkpoint-item{display:flex;align-items:flex-start;gap:10px}
.check-icon{width:20px;height:20px;border-radius:50%;background:var(--green-bg);border:1px solid rgba(45,107,73,.15);display:grid;place-items:center;color:var(--green);font-weight:800;flex-shrink:0;margin-top:2px}
.roles-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin:14px 0}
.role-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px}
.role-icon{width:42px;height:42px;border-radius:12px;background:var(--blue-bg);display:grid;place-items:center;margin-bottom:8px}
.role-name{font-size:.85rem;font-weight:800;margin-bottom:4px}
.role-sub{font-size:.72rem;font-family:"IBM Plex Mono",monospace;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.role-desc{font-size:.79rem;color:var(--text-2)}
.risk-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:14px 0}
.risk-card{border-radius:12px;border:1px solid var(--line);overflow:hidden;background:#fff}
.risk-head{padding:10px 12px;font-family:"IBM Plex Mono",monospace;font-size:.74rem;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.risk-card.warn .risk-head{background:var(--red-bg);color:var(--red)}
.risk-card.caution .risk-head{background:var(--gold-bg);color:var(--gold)}
.risk-card.info .risk-head{background:var(--blue-bg);color:var(--navy-2)}
.risk-body{padding:12px;font-size:.84rem;color:var(--text-2)}
.source-card a{word-break:break-word}
.lesson-nav-bar{display:flex;justify-content:space-between;gap:12px;border-top:1px solid var(--line);padding-top:20px;margin-top:36px}
.nav-action{display:flex;align-items:center;gap:8px;padding:10px 15px;border:1px solid var(--line);border-radius:10px;background:#fff;text-decoration:none;font-size:.84rem;font-weight:700;color:var(--text-2);cursor:pointer}
.nav-action.primary{background:var(--navy);border-color:var(--navy);color:#fff}
.complete-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:16px}
.complete-btn{padding:10px 14px;border-radius:10px;border:1px solid var(--line);background:#fff;font-size:.82rem;font-weight:700;cursor:pointer}
.complete-btn.active{background:var(--green);border-color:var(--green);color:#fff}
.helper-note{font-size:.78rem;color:var(--text-3)}

.home-hero{padding:6px 0 14px}
.home-title{font-size:clamp(1.6rem,3.2vw,2.3rem);line-height:1.15;letter-spacing:-.03em;font-weight:800;margin-bottom:12px}
.home-desc{font-size:1rem;color:var(--text-2);max-width:720px;margin-bottom:18px}
.home-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin:18px 0 22px}
.home-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;transition:transform .16s var(--ease),box-shadow .16s var(--ease),border-color .16s var(--ease)}
.home-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--line-strong)}
.home-card-num{width:28px;height:28px;border-radius:999px;background:var(--sidebar);display:grid;place-items:center;font-family:"IBM Plex Mono",monospace;font-size:.75rem;font-weight:700;color:var(--navy);margin-bottom:10px}
.home-card-title{font-size:.98rem;font-weight:800;margin-bottom:6px;color:var(--text)}
.home-card-desc{font-size:.84rem;color:var(--text-2)}
.home-mini-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:10px}
.home-panel-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}
.home-panel-card h3{font-size:.92rem;font-weight:800;margin-bottom:8px}
.home-panel-card p,.home-panel-card li{font-size:.84rem;color:var(--text-2)}
.home-panel-card ul{padding-left:16px}
.sidebar-arrow-note{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px dashed var(--line-strong);border-radius:14px;padding:12px 14px;margin-bottom:16px}
.sidebar-arrow-note svg{width:40px;height:24px;flex-shrink:0}
.sidebar-arrow-note p{font-size:.8rem;color:var(--text-2);font-weight:600}
.glossary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:16px 0}
.glossary-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.glossary-term{font-size:.78rem;font-family:"IBM Plex Mono",monospace;color:var(--navy);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.glossary-meaning{font-size:.88rem;color:var(--text-2)}
.source-cats{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0 18px}
.source-cat{padding:7px 11px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:.76rem;font-weight:700;color:var(--text-2)}
.source-library-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:16px 0}
.source-library-item{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}
.source-library-item h3{font-size:.94rem;font-weight:800;margin-bottom:6px}
.source-library-meta{font-size:.72rem;font-family:"IBM Plex Mono",monospace;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.source-library-item p{font-size:.84rem;color:var(--text-2);margin-bottom:10px}
.source-library-item a{font-size:.82rem;word-break:break-word}
.src-publisher-row{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.src-publisher{display:inline-flex;align-items:center;gap:5px;font-size:.71rem;font-family:"IBM Plex Mono",monospace;font-weight:700;background:var(--sidebar);border:1px solid var(--line);padding:3px 8px;border-radius:6px;color:var(--text-2)}
.src-section-tag{display:inline-flex;align-items:center;font-size:.71rem;font-family:"IBM Plex Mono",monospace;font-weight:700;background:var(--blue-bg);border:1px solid rgba(38,65,99,.15);padding:3px 8px;border-radius:6px;color:var(--navy-2)}
.src-why{font-size:.78rem;color:var(--text-3);border-top:1px solid var(--line);padding-top:8px;margin-top:8px;font-style:italic}
.src-why strong{color:var(--text-3);font-weight:700;font-style:normal}
.src-section-heading{font-size:.98rem;font-weight:800;color:var(--text);padding:14px 0 8px;border-bottom:2px solid var(--line);margin:28px 0 14px;display:flex;align-items:center;gap:10px}
.src-section-heading .src-section-count{font-size:.7rem;font-family:"IBM Plex Mono",monospace;background:var(--sidebar);border:1px solid var(--line);padding:2px 7px;border-radius:999px;color:var(--text-3);font-weight:700;margin-left:auto}
.src-section-block{margin-bottom:10px}
.source-library-item a.src-link{display:inline-block;margin-top:8px;font-size:.78rem;color:var(--navy-2);font-weight:600;text-decoration:none;word-break:break-all}
.source-library-item a.src-link:hover{text-decoration:underline}
.page-content{display:none;animation:fade .25s var(--ease)}
.page-content.active{display:block}
@media(max-width:980px){.home-grid,.glossary-grid,.source-library-grid{grid-template-columns:1fr}.home-mini-grid{grid-template-columns:1fr}}

@media(max-width:980px){.roles-grid{grid-template-columns:repeat(2,1fr)}.risk-grid{grid-template-columns:1fr}.def-grid{grid-template-columns:1fr}}
@media(max-width:768px){
  .brand{width:auto;border-right:none}
  .topbar-center{display:none}
  .mobile-toggle{display:grid;place-items:center}
  .progress-pill{display:none}
  #sidebar{transform:translateX(-100%);transition:transform .28s var(--ease);z-index:60}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
}
@media(max-width:520px){
  .content-area{padding:20px 16px 54px}
  .lesson-nav-bar{flex-direction:column}
  .nav-action,.complete-btn{justify-content:center}
  .roles-grid{grid-template-columns:1fr}
}
</style>

<style id="responsive-optimization">
  html, body { overflow-x: hidden; }
  img, svg { max-width: 100%; height: auto; }
  .content-area { width: min(100%, 1100px); }
  .lesson-body, .lc-intro, .home-desc { text-wrap: pretty; }
  .lesson-body p, .glossary-meaning, .source-library-item p, .faq-a, .quiz-a, .source-body, .example-body, .mistake-body {
    overflow-wrap: anywhere;
    word-break: normal;
  }
  .quickbar { overflow-x: auto; padding-bottom: 4px; scrollbar-width: thin; }
  .quickbar::-webkit-scrollbar { height: 6px; }
  .quickbar::-webkit-scrollbar-thumb { background: rgba(36,31,24,.16); border-radius: 999px; }
  .quick-chip { white-space: nowrap; flex: 0 0 auto; }
  .home-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .roles-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
  .source-library-item, .glossary-card, .home-card, .home-panel-card, .def-block, .role-card, .risk-card, .example-card, .mistake-card, .faq-item, .checkpoint-item, .quiz-card, .source-card {
    min-width: 0;
  }
  #sidebar {
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }
  #sidebarOverlay {
    position: fixed;
    inset: var(--topbar-h) 0 0 0;
    background: rgba(24, 28, 33, 0.34);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s var(--ease);
    z-index: 55;
  }
  body.sidebar-open #sidebarOverlay {
    opacity: 1;
    pointer-events: auto;
  }
  @media (min-width: 1280px) {
    :root { --sidebar-w: 300px; }
    .content-area { max-width: 1160px; padding-top: 40px; padding-bottom: 88px; }
    .lesson-body p { font-size: 1rem; }
  }
  @media (max-width: 980px) {
    .content-area { max-width: 100%; padding-inline: 22px; }
    .home-grid, .glossary-grid, .source-library-grid { grid-template-columns: 1fr; }
    .home-mini-grid { grid-template-columns: 1fr; }
    .roles-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .risk-grid, .def-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    #sidebar {
      width: min(88vw, 360px);
      transform: translateX(-104%);
      box-shadow: 0 18px 40px rgba(0,0,0,.18);
      z-index: 60;
    }
    #sidebar.open { transform: translateX(0); }
    body.sidebar-open { overflow: hidden; }
    .content-area { padding: 20px 16px 56px; }
    .brand { min-width: 0; gap: 10px; padding-inline: 14px; }
    .brand-title { font-size: .84rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand-sub { display: none; }
    .topbar-right { gap: 8px; padding-right: 10px; }
    .lang-toggle { padding: 7px 9px; font-size: .74rem; }
    .sidebar-arrow-note { padding: 10px 12px; }
    .sidebar-arrow-note p { font-size: .76rem; line-height: 1.5; }
    .home-title { font-size: clamp(1.45rem, 7vw, 2rem); }
    .lc-title { font-size: clamp(1.35rem, 6vw, 1.8rem); }
    .lc-intro, .home-desc { font-size: .95rem; }
    .lesson-body h2 { font-size: 1.02rem; }
    .lesson-body p { font-size: .92rem; }
    .roles-grid { grid-template-columns: 1fr; }
    .lesson-nav-bar, .complete-row { flex-direction: column; align-items: stretch; }
    .nav-action, .complete-btn { justify-content: center; width: 100%; }
  }
  @media (max-width: 420px) {

    {
      cat:"Foundation", title:"Blockchain, explained simply",
      intro:"A blockchain is a shared ledger. Instead of one company keeping the only record, many computers keep and verify the same record together. This is why blockchain feels different from a normal app database.",
      sections:[
        {h:"Start with the easiest idea", ps:["Imagine a notebook that records who sent value to whom. In a bank, the bank controls the notebook. In a blockchain network, many participants keep the notebook honest together.","That does not mean every blockchain works the same way. It means the basic idea is shared verification. If many participants confirm the same record, it becomes much harder for one actor to secretly change history."]},
        {h:"Why beginners should care", ps:["Many people buy crypto without understanding what makes a blockchain useful. They see prices, logos, or apps first. But if you do not understand the record system underneath, it becomes hard to judge risk, safety, or ownership.","The blockchain matters because it is the layer where transactions, balances, and ownership are recorded. If that part feels clear, wallets and tokens also become easier to understand."]},
        {h:"Blocks, chains, and nodes", ps:["Transactions are collected into blocks. Each new block points back to the block before it. That is why people call it a chain of blocks.","A node is simply a computer that helps read, store, or verify the ledger. You do not need to memorize the technical details first. For beginners, it is enough to understand that many nodes help protect the record."]},
        {h:"What makes it powerful", ps:["A blockchain can reduce dependence on a single central database. That is why people use it for digital assets and ownership records.","But the same structure also means mistakes can be difficult to reverse. If you send something to the wrong place, there may be no central customer support that can always undo it. That is why learning structure comes before speed."]}
      ],
      defs:[["Ledger","A ledger is a record of transactions or balances."],["Node","A computer that helps keep or verify the record."],["Block","A group of transactions added to the chain."],["Chain","The ordered link between one block and the next."]],
      example:"A bank transfer usually depends on the bank’s database. A blockchain transfer depends on the network’s shared record.",
      mistakes:["Thinking blockchain means “guaranteed safety” in every situation.","Assuming every transaction can be reversed like a card payment.","Treating blockchain like a mysterious word instead of a record system."],
      faqs:[["Can one company change the blockchain alone?","On a public blockchain, one actor usually cannot change the full shared record alone. That is one of the reasons people trust shared verification."],["Why is a blockchain called transparent?","Because transaction records can often be checked openly with an explorer, even if real names are not always shown."],["Do I need to understand coding first?","No. Beginners only need the big idea first: shared record, shared verification, and harder-to-change history."]],
      checkpoints:["I can explain blockchain as a shared ledger.","I understand why shared verification matters.","I know why a confirmed transaction may be hard to reverse."],
      quiz:[["What is the simplest beginner definition of a blockchain?","A shared ledger that many participants verify together."],["Why should beginners care about blockchain structure?","Because ownership, balances, and transactions are recorded there."]]
    },
    {
      cat:"Access", title:"Wallets, explained simply",
      intro:"A wallet is not mainly a box that stores coins. A wallet is the tool that manages the keys that let you access and control digital assets recorded on a blockchain.",
      sections:[
        {h:"The biggest beginner misunderstanding", ps:["Many people imagine a wallet as if coins are sitting inside it like cash in a leather wallet. That picture is understandable, but it is incomplete.","Your assets are recorded on the blockchain. The wallet helps you prove control over those assets. That is why many educators say a wallet is closer to a key manager than a coin container."]},
        {h:"Address, private key, and seed phrase", ps:["A wallet address is where you receive assets. You can share your address.","A private key is what gives control. It should never be shared.","A seed phrase is a recovery backup that can restore the wallet. If someone gets your seed phrase, they may be able to take your assets."]},
        {h:"Custodial vs self-custody", ps:["If an exchange controls the keys for you, that is custodial. It may feel convenient, but you depend on that platform’s security and decisions.","If you control the keys yourself, that is self-custody. It gives more control, but also more responsibility. Beginners should understand both models before choosing what fits their situation."]},
        {h:"Why wallets matter in practice", ps:["Wallet knowledge is not just technical theory. It affects how you receive, send, store, back up, and protect digital assets.","Many beginner losses happen because someone shared a seed phrase, trusted a fake support message, or approved something without understanding what the wallet was doing."]}

      defs:[["Wallet address","The public receiving address you can share."],["Private key","The secret key that controls access."],["Seed phrase","A backup phrase used to recover a wallet."],["Custodial wallet","A wallet where a service controls the keys for you."]],
      example:"Think of the address like a mailbox address. Think of the private key like the secret key to open the box.",

      faqs:[["Can I share my wallet address?","Yes. A wallet address is meant to receive funds."],["Can I share my private key or seed phrase?","No. Anyone with them may gain control over the wallet."],["Is self-custody always better?","It offers more direct control, but also more responsibility. Beginners should not ignore the backup and security side."]],
      checkpoints:["I know the difference between an address and a private key.","I know why a seed phrase must stay private.","I understand the difference between custodial and self-custody."],

    {
      cat:"Safety", title:"Safe crypto transfers",
      intro:"Crypto transfers do not need to feel scary, but they do require a repeatable safety habit. The simplest checklist is: network, address, test transfer, then TxID verification.",
      sections:[
        {h:"Why people make transfer mistakes", ps:["Beginners often rush. They assume the pasted address is correct, ignore the network, or send a full amount before testing.","The problem is that blockchain transfers can be difficult to reverse. That is why the safe habit matters more than confidence."]},
        {h:"The 4-step habit", ps:["First, confirm the network. Some assets move on multiple networks, and the correct destination matters.","Second, check the address carefully. Do not trust it blindly just because it is copied into the field.","Third, send a small test amount when possible. If the test works, then send the larger amount.","Fourth, verify the transfer with the transaction ID, often called the TxID or hash."]},

    {
      cat:"Roles", title:"The 5 roles of crypto",
      intro:"Crypto becomes much easier when you stop asking only “What is the name?” and start asking “What role does it play?” One token can work like digital cash, another like access, and another like voting power.",
      sections:[
        {h:"Role beats label", ps:["Beginners often feel lost because every project has a new name, logo, or slogan. The name changes, but the underlying role is often easier to classify.","That is why role-based learning helps. When you understand the job a token or asset is trying to do, the space becomes more readable."]},
        {h:"Five useful beginner categories", ps:["DeFi can be understood like banking functions done with code and wallets rather than a traditional bank counter.","Utility tokens are easiest to understand like points, access, or service functions inside an ecosystem.","Governance tokens are closest to voting rights in a protocol or community.","NFTs are easiest to understand as proof of ownership for a specific digital item.","Stablecoins are closest to digital cash designed to stay near a reference value."]},
        {h:"Why this matters", ps:["If you confuse a stablecoin with a governance token, or an NFT with a utility token, you may misunderstand both the use case and the risk.","Role-based thinking also helps you compare projects more clearly. Instead of following hype, you can ask what problem the token is supposed to solve."]},
        {h:"A better beginner question", ps:["Instead of asking only “Is this coin good?” ask: “What is this token for? Who uses it? Why does it exist? What risk comes with that role?”","These questions do not guarantee perfect decisions, but they create a much better starting point than guessing from the name alone."]}

    {

        {h:"가장 쉬운 출발점", ps:["블록체인은 어렵고 거대한 기술 용어처럼 느껴질 수 있지만, 초보자에게 가장 중요한 핵심은 하나입니다. 바로 ‘공유 기록’입니다.","은행에서는 보통 은행이 거래 장부를 관리합니다. 하지만 블록체인에서는 여러 참여자가 같은 거래 기록을 확인하고 유지합니다. 그래서 한쪽이 마음대로 기록을 바꾸기 더 어렵습니다."]},

      defs:[["원장","거래나 잔액을 기록하는 장부입니다."],["노드","기록을 읽고 저장하거나 검증하는 컴퓨터입니다."],["블록","거래가 묶여 저장되는 단위입니다."],["체인","블록이 순서대로 연결된 구조입니다."]],

function renderSources(){
  const items = getSourceItems();
  const cats = getSourceCats();
  // Build a map of cat_key -> items
  const byCategory = {};
  items.forEach(item=>{
    const key = item[0];
    if(!byCategory[key]) byCategory[key] = [];
    byCategory[key].push(item);
  });
  // Section labels from i18n or cats list
  const catLabelMap = {};
  cats.forEach(c=>{ catLabelMap[c.key] = c.label; });
  // Cat keys that have items, in defined order
  const orderedKeys = cats.map(c=>c.key).filter(k=>byCategory[k] && byCategory[k].length>0);
  // Fallback: also include any extra keys not in cats list
  Object.keys(byCategory).forEach(k=>{ if(!orderedKeys.includes(k)) orderedKeys.push(k); });

  // Build category filter chips
  const chipHtml = orderedKeys.map(k=>{
    const label = catLabelMap[k] || k;
    const count = (byCategory[k]||[]).length;
    return `<div class="source-cat">${label} <span style="font-size:.65rem;opacity:.6;margin-left:3px">(${count})</span></div>`;
  }).join('');

  // Build category sections
  const sectionsHtml = orderedKeys.map(k=>{
    const label = catLabelMap[k] || k;
    const catItems = byCategory[k] || [];
    const cardsHtml = catItems.map(([_cat, publisher, title, body, url, relatedSection, whyMatters])=>{
      return `<div class="source-library-item">
        <div class="source-library-meta">${catLabelMap[_cat]||_cat}</div>
        <div class="src-publisher-row">
          <span class="src-publisher">&#9654; ${publisher}</span>
          ${relatedSection ? `<span class="src-section-tag">&#8594; ${relatedSection}</span>` : ''}
        </div>
        <h3>${title}</h3>
        <p>${body}</p>
        ${whyMatters ? `<div class="src-why"><strong>Why this matters:</strong> ${whyMatters}</div>` : ''}
        <a class="src-link" href="${url}" target="_blank" rel="noopener">&#128279; ${url.replace(/^https?:\/\//,'').replace(/\/$/,'').substring(0,55)}${url.length>60?'…':''}</a>
      </div>`;
    }).join('');
    return `<div class="src-section-block">
      <div class="src-section-heading">${label}<span class="src-section-count">${catItems.length}</span></div>
      <div class="source-library-grid">${cardsHtml}</div>
    </div>`;
  }).join('');

  return `
    <div class="lc-header">
      <div class="lc-meta"><span class="meta-pill">S</span><span class="meta-cat">${t('nav.sources')}</span></div>
      <h1 class="lc-title">${t('sources.pageTitle')}</h1>
      <p class="lc-intro">${t('sources.pageDesc')}</p>
    </div>
    <div class="source-cats">${chipHtml}</div>
    ${sectionsHtml}`;
}

function renderLesson(i){
  const lesson=(lessonOverrides[currentLang]&&lessonOverrides[currentLang][i]) || (lessons[currentLang]&&lessons[currentLang][i]) || lessons.en[i];
  const prevBtn = i===0 ? `<a class="nav-action" href="#" onclick="return false;" style="opacity:.45;pointer-events:none;">${t('btn.prev')}</a>` : `<a class="nav-action" href="#" onclick="showLesson(${i-1});return false;">${t('btn.prev')}</a>`;
  const nextBtn = i===4 ? `<a class="nav-action primary" href="#" onclick="showLesson(0);return false;">${t('btn.restart')}</a>` : `<a class="nav-action primary" href="#" onclick="showLesson(${i+1});return false;">${t('btn.next')}</a>`;
  const sectionHtml = lesson.sections.map(sec=>`<h2>${sec.h}</h2>${sec.ps.map(p=>`<p>${p}</p>`).join('')}`).join('');
  const defs = lesson.defs ? `<div class="def-grid">${lesson.defs.map(([term,body])=>`<div class="def-block"><div class="def-term">${term}</div><div class="def-body">${body}</div></div>`).join('')}</div>` : '';
  const example = lesson.example ? `<h3>${t('example.title')}</h3><div class="example-card"><div class="example-label">${t('example.title')}</div><div class="example-body">${lesson.example}</div></div>` : '';
  const mistakes = lesson.mistakes ? `<h3>${t('mistakes.title')}</h3>${lesson.mistakes.map(m=>`<div class="mistake-card"><div class="mistake-label">${t('mistakes.title')}</div><div class="mistake-body">${m}</div></div>`).join('')}` : '';
  const faqs = lesson.faqs ? `<h3>${t('faq.title')}</h3>${lesson.faqs.map(([q,a])=>`<div class="faq-item"><div class="faq-q">${q}</div><div class="faq-a">${a}</div></div>`).join('')}` : '';
  const checks = lesson.checkpoints ? `<h3>${t('check.title')}</h3><div class="checkpoint-list">${lesson.checkpoints.map(c=>`<div class="checkpoint-item"><div class="check-icon">✓</div><div>${c}</div></div>`).join('')}</div>` : '';
  const quiz = lesson.quiz ? renderQuiz(lesson.quiz) : '';
  const sources = lesson.sources ? `<h3>${t('sources.title')}</h3>${lesson.sources.map(([title,body,url])=>`<div class="source-card"><div class="source-label">${t('source.title')}: ${title}</div><div class="source-body">${body}<br><a href="${url}" target="_blank" rel="noopener">${url}</a></div></div>`).join('')}` : '';
  const transferFlow = i===2 ? `
    <ul class="steps-list">
      <li class="step-item"><div class="step-n">1</div><div><div class="step-title">${t('v.network')}</div><div class="step-desc">${t('v.networkDesc')}</div></div></li>
      <li class="step-item"><div class="step-n">2</div><div><div class="step-title">${t('v.address')}</div><div class="step-desc">${t('v.addressDesc')}</div></div></li>
      <li class="step-item"><div class="step-n">3</div><div><div class="step-title">${t('v.test')}</div><div class="step-desc">${t('v.testDesc')}</div></div></li>
      <li class="step-item"><div class="step-n">4</div><div><div class="step-title">${t('v.txid')}</div><div class="step-desc">${t('v.txidDesc')}</div></div></li>
    </ul>` : '';
  const completeClass = completed.has(i) ? 'active' : '';
  return `
    <div class="lc-header">
      <div class="lc-meta"><span class="meta-pill">${t('breadcrumb.prefix')} ${i+1} / 5</span><span class="meta-cat">${lesson.cat}</span></div>
      <h1 class="lc-title">${lesson.title}</h1>
      <p class="lc-intro">${lesson.intro}</p>
      <div class="callout info"><strong>${t('callout.quick')}:</strong> ${lesson.sections[0].ps[0]}</div>
    </div>
    <div class="lesson-body">
      ${visualForLesson(i)}
      ${sectionHtml}
      ${defs}
      ${transferFlow}
      ${example}
      ${mistakes}
      ${faqs}
      ${checks}
      ${quiz}
      ${sources}
      <div class="complete-row">
        <button class="complete-btn ${completeClass}" onclick="toggleComplete(${i}, this)">${completed.has(i) ? t('btn.completed') : t('btn.mark')}</button>
        <div class="helper-note">${t('complete.note')}</div>
      </div>
      <div class="lesson-nav-bar">${prevBtn}${nextBtn}</div>
    </div>`;
}

function renderAllLessons(){
  for(let i=0;i<5;i++) document.getElementById(`lesson${i}`).innerHTML = renderLesson(i);
  document.getElementById('homePanel').innerHTML = renderHome();
  document.getElementById('startPanel').innerHTML = renderStartHere();
  document.getElementById('faqPanel').innerHTML = renderFAQPage();
  document.getElementById('safetyPanel').innerHTML = renderSafetyPage();
  document.getElementById('glossaryPanel').innerHTML = renderGlossary();
  document.getElementById('sourcesPanel').innerHTML = renderSources();
}
function applyUI(){
  document.querySelectorAll('[data-i18n]').forEach(el=> el.innerHTML = t(el.dataset.i18n));
  document.getElementById('currentLangLabel').textContent = langLabels[currentLang] || currentLang.toUpperCase();
}
function setBreadcrumb(label){
  document.getElementById('breadcrumb').textContent = label || `${t('breadcrumb.prefix')} ${currentLesson+1} / 5`;
}
function activateSidebar(page=null, lesson=null){
  document.querySelectorAll('.lesson-nav-item[data-page], .lesson-nav-item[data-lesson]').forEach(el=>el.classList.remove('active'));
  if(page){
    const el=document.querySelector(`.lesson-nav-item[data-page="${page}"]`);
    if(el) el.classList.add('active');
  }
  document.querySelectorAll('.lesson-nav-item[data-lesson]').forEach((el,idx)=>el.classList.toggle('done', completed.has(idx) && idx!==lesson));
  if(lesson!==null){
    const el=document.querySelector(`.lesson-nav-item[data-lesson="${lesson}"]`);
    if(el) el.classList.add('active');
  }
}
function showPage(page){
  currentPage = page;
  document.querySelectorAll('.lesson-content, .page-content').forEach(el=>el.classList.remove('active'));
  if(page==='home'){ document.getElementById('homePanel').classList.add('active'); setBreadcrumb(t('nav.home')); activateSidebar('home', null); }
  if(page==='start'){ document.getElementById('startPanel').classList.add('active'); setBreadcrumb(t('nav.start')); activateSidebar('start', null); }
  if(page==='faq'){ document.getElementById('faqPanel').classList.add('active'); setBreadcrumb(t('nav.faqPage')); activateSidebar('faq', null); }
  if(page==='safety'){ document.getElementById('safetyPanel').classList.add('active'); setBreadcrumb(t('nav.safety')); activateSidebar('safety', null); }
  if(page==='glossary'){ document.getElementById('glossaryPanel').classList.add('active'); setBreadcrumb(t('nav.glossary')); activateSidebar('glossary', null); }
  if(page==='sources'){ document.getElementById('sourcesPanel').classList.add('active'); setBreadcrumb(t('nav.sources')); activateSidebar('sources', null); }
  updateProgress();
  document.getElementById('sidebar').classList.remove('open');
  window.scrollTo({top:0, behavior:'smooth'});
}
function showLesson(i){
  currentLesson = i;
  currentPage = `lesson${i}`;
  document.querySelectorAll('.lesson-content, .page-content').forEach(el=>el.classList.remove('active'));
  document.getElementById(`lesson${i}`).classList.add('active');
  activateSidebar(null, i);
  setBreadcrumb(`${t('breadcrumb.prefix')} ${currentLesson+1} / 5`);
  updateProgress();
  document.getElementById('sidebar').classList.remove('open');
  window.scrollTo({top:0, behavior:'smooth'});
}
function updateProgress(){
  const dots=document.getElementById('progressDots'); dots.innerHTML='';
  for(let i=0;i<5;i++){
    const d=document.createElement('div');
    d.className='progress-dot'+(completed.has(i)?' done':(i===currentLesson?' active':''));
    dots.appendChild(d);
  }
  document.getElementById('progressText').textContent = `${completed.size} / 5 ${t('progress.done')}`;
}
function toggleComplete(i, btn){
  if(completed.has(i)) completed.delete(i); else completed.add(i);
  localStorage.setItem('cryptoAcademyCompleted', JSON.stringify([...completed]));
  btn.classList.toggle('active', completed.has(i));
  btn.textContent = completed.has(i) ? t('btn.completed') : t('btn.mark');
  updateProgress();
  document.querySelectorAll('.lesson-nav-item[data-lesson]').forEach((el,idx)=>el.classList.toggle('done', completed.has(idx) && idx!==currentLesson));
}
function setLang(lang){
  currentLang = lang;
  localStorage.setItem('cryptoAcademyLang', lang);
  document.documentElement.lang = lang;

<script id="responsive-optimization-script">
(function(){
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const mobileToggle = document.getElementById('mobileToggle');
  const syncSidebarState = () => {
    const open = sidebar.classList.contains('open');
    document.body.classList.toggle('sidebar-open', open && window.innerWidth <= 768);
  };
  if (mobileToggle) {
    mobileToggle.addEventListener('click', () => {
      requestAnimationFrame(syncSidebarState);
    });
  }
  if (overlay) {
    overlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      syncSidebarState();
    });
  }
  const originalCloseSidebar = window.closeSidebar;
  window.closeSidebar = function(){
    if (typeof originalCloseSidebar === 'function') originalCloseSidebar();
    sidebar.classList.remove('open');
    syncSidebarState();
  };
  const originalShowLesson = window.showLesson;
  if (typeof originalShowLesson === 'function') {
    window.showLesson = function(i){
      originalShowLesson(i);
      sidebar.classList.remove('open');
      syncSidebarState();
    };
  }
  const originalShowPage = window.showPage;
  if (typeof originalShowPage === 'function') {
    window.showPage = function(name){
      originalShowPage(name);
      sidebar.classList.remove('open');
      syncSidebarState();
    };
  }
  window.addEventListener('resize', syncSidebarState);
  syncSidebarState();
})();
</script>

    {
      cat:"الأساسيات",title:"البلوكشين بشرح مبسط",
      intro:"البلوكشين هو سجل مشترك. بدلاً من أن تحتفظ شركة واحدة بالسجل الوحيد، تحتفظ عدة حواسيب بالسجل نفسه وتتحقق منه معاً.",
      sections:[
        {h:"ابدأ بأبسط فكرة",ps:["تخيّل دفتراً يسجّل من أرسل قيمة لمن. في البنك، البنك يتحكم في الدفتر. في شبكة بلوكشين، عدة مشاركين يحافظون على صحة الدفتر معاً.","هذا لا يعني أن كل بلوكشين يعمل بنفس الطريقة. لكن الفكرة الأساسية هي التحقق المشترك. عندما يؤكد عدة مشاركين نفس السجل، يصبح تغيير التاريخ سراً أصعب بكثير."]},
        {h:"لماذا يجب أن يهتم المبتدئ",ps:["كثيرون يشترون الكريبتو دون فهم ما الذي يجعل البلوكشين مفيداً. يرون الأسعار والشعارات والتطبيقات أولاً. لكن إذا لم تفهم نظام السجلات الأساسي، يصعب تقييم المخاطر والأمان والملكية.","البلوكشين مهم لأنه الطبقة التي تُسجّل فيها المعاملات والأرصدة والملكية. إذا كان هذا الجزء واضحاً، ستصبح المحافظ والرموز أسهل للفهم."]},
        {h:"الكتل والسلاسل والعقد",ps:["تُجمع المعاملات في كتل. كل كتلة جديدة تشير إلى الكتلة التي قبلها. لهذا يُسمى سلسلة من الكتل.","العقدة هي ببساطة حاسوب يساعد في قراءة السجل أو تخزينه أو التحقق منه. لا تحتاج لحفظ التفاصيل التقنية أولاً. يكفي أن تفهم أن عدة عقد تساعد في حماية السجل."]},
        {h:"ما الذي يجعله قوياً",ps:["يمكن للبلوكشين تقليل الاعتماد على قاعدة بيانات مركزية واحدة. لهذا يستخدمه الناس للأصول الرقمية وسجلات الملكية.","لكن نفس الهيكل يعني أيضاً أن الأخطاء قد يصعب التراجع عنها. إذا أرسلت شيئاً إلى المكان الخطأ، قد لا يكون هناك دعم عملاء مركزي يمكنه دائماً التراجع عنه."]}
      ],
      defs:[["السجل","سجل للمعاملات أو الأرصدة."],["العقدة","حاسوب يساعد في حفظ أو التحقق من السجل."],["الكتلة","مجموعة معاملات تُضاف إلى السلسلة."],["السلسلة","الرابط المرتب بين كتلة وأخرى."]],
      example:"التحويل البنكي يعتمد على قاعدة بيانات البنك. تحويل البلوكشين يعتمد على السجل المشترك للشبكة.",
      mistakes:["الاعتقاد بأن البلوكشين يعني 'أماناً مضموناً' في كل حالة.","افتراض أن كل معاملة يمكن التراجع عنها مثل الدفع بالبطاقة.","التعامل مع البلوكشين ككلمة غامضة بدلاً من نظام سجلات."],

      defs:[["الشبكة","نظام البلوكشين الذي يتحرك عليه الأصل."],["التحويل التجريبي","مبلغ صغير يُرسل أولاً للتحقق من أن كل شيء يعمل."],["معرّف المعاملة","معرّف المعاملة المستخدم للتحقق من التحويل."],["المستكشف","موقع أو أداة تُستخدم للتحقق من سجلات معاملات البلوكشين."]],

    {

  lessonOverrides.vi = [
    {
      cat:"Nền tảng",title:"Blockchain giải thích đơn giản",
      intro:"Blockchain là một sổ cái chia sẻ. Thay vì một công ty giữ bản ghi duy nhất, nhiều máy tính cùng giữ và xác minh cùng một bản ghi.",
      sections:[
        {h:"Bắt đầu với ý tưởng đơn giản nhất",ps:["Hãy tưởng tượng một cuốn sổ ghi lại ai đã gửi giá trị cho ai. Ở ngân hàng, ngân hàng kiểm soát cuốn sổ. Trong mạng blockchain, nhiều người tham gia cùng giữ cuốn sổ trung thực.","Điều này không có nghĩa mọi blockchain hoạt động giống nhau. Ý tưởng cơ bản là xác minh chung. Khi nhiều người xác nhận cùng một bản ghi, việc thay đổi lịch sử trở nên khó hơn nhiều."]},
        {h:"Tại sao người mới nên quan tâm",ps:["Nhiều người mua crypto mà không hiểu điều gì làm blockchain hữu ích. Họ thấy giá, logo hoặc ứng dụng trước. Nhưng nếu bạn không hiểu hệ thống ghi chép bên dưới, rất khó đánh giá rủi ro, an toàn hay quyền sở hữu.","Blockchain quan trọng vì nó là lớp nơi giao dịch, số dư và quyền sở hữu được ghi lại. Nếu phần này rõ ràng, ví tiền và token cũng trở nên dễ hiểu hơn."]},
        {h:"Khối, chuỗi và nút mạng",ps:["Các giao dịch được thu thập vào các khối. Mỗi khối mới trỏ về khối trước nó. Đó là lý do người ta gọi nó là chuỗi các khối.","Nút mạng đơn giản là một máy tính giúp đọc, lưu trữ hoặc xác minh sổ cái. Bạn không cần nhớ chi tiết kỹ thuật trước. Chỉ cần hiểu rằng nhiều nút mạng giúp bảo vệ bản ghi là đủ."]},
        {h:"Điều gì làm nó mạnh mẽ",ps:["Blockchain có thể giảm sự phụ thuộc vào một cơ sở dữ liệu trung tâm duy nhất. Đó là lý do người ta dùng nó cho tài sản số và hồ sơ quyền sở hữu.","Nhưng cùng cấu trúc đó cũng có nghĩa là sai lầm có thể khó đảo ngược. Nếu bạn gửi nhầm chỗ, có thể không có bộ phận hỗ trợ khách hàng nào có thể hoàn tác."]}
      ],
      defs:[["Sổ cái","Bản ghi các giao dịch hoặc số dư."],["Nút mạng","Máy tính giúp giữ hoặc xác minh bản ghi."],["Khối","Nhóm giao dịch được thêm vào chuỗi."],["Chuỗi","Liên kết có thứ tự giữa khối này và khối tiếp theo."]],
      example:"Chuyển khoản ngân hàng phụ thuộc vào cơ sở dữ liệu của ngân hàng. Chuyển blockchain phụ thuộc vào bản ghi chia sẻ của mạng lưới.",
      mistakes:["Nghĩ rằng blockchain có nghĩa là 'an toàn tuyệt đối' trong mọi tình huống.","Cho rằng mọi giao dịch đều có thể đảo ngược như thanh toán bằng thẻ.","Coi blockchain như một từ bí ẩn thay vì một hệ thống ghi chép."],
      faqs:[["Một công ty có thể tự thay đổi blockchain không?","Trên blockchain công khai, thường một bên không thể tự thay đổi toàn bộ bản ghi chia sẻ."],["Tại sao blockchain được gọi là minh bạch?","Vì các bản ghi giao dịch thường có thể kiểm tra công khai qua trình khám phá."],["Tôi có cần hiểu lập trình trước không?","Không. Người mới chỉ cần ý tưởng lớn trước: bản ghi chia sẻ, xác minh chung và lịch sử khó thay đổi."]],

      quiz:[["Định nghĩa đơn giản nhất của blockchain cho người mới là gì?","Một sổ cái chia sẻ mà nhiều người tham gia cùng xác minh."],["Tại sao người mới nên quan tâm đến cấu trúc blockchain?","Vì quyền sở hữu, số dư và giao dịch được ghi lại ở đó."]]

      sections:[

<script>
(function(){

  };

  function ic(name){return '<span class="sec-icon">'+ICONS[name]+'</span>';}

  // Lesson index → icon mapping
  var lessonIcons = ['blockchain','wallet','transfer','layers','filetext'];
  // Page → icon mapping
  var pageIcons = {home:'home',start:'compass',faq:'faq',safety:'shield',glossary:'book',sources:'library'};
  // Mistake card icons
  var mistakeCardIcons = ['key','link','shieldx','send','extalert'];

  // 1. Replace sidebar nav-num content with SVG icons
  var sidebarItems = document.querySelectorAll('#sidebar .lesson-nav-item');
  sidebarItems.forEach(function(item){
    var numEl = item.querySelector('.nav-num');
    if(!numEl) return;
    var lessonIdx = item.getAttribute('data-lesson');
    var pageAttr = item.getAttribute('data-page');
    if(lessonIdx !== null){
      var idx = parseInt(lessonIdx);
      if(lessonIcons[idx]) numEl.innerHTML = ic(lessonIcons[idx]);
    } else if(pageAttr && pageIcons[pageAttr]){
      numEl.innerHTML = ic(pageIcons[pageAttr]);
    }
  });

  // 2. Patch renderHome to use SVG icons in home-card-num
  var __prevRenderHome = window.renderHome;
  window.renderHome = function(){
    var html = __prevRenderHome();
    // Replace home-card-num numbers with icons for lessons 1-5
    for(var i=0;i<5;i++){
      html = html.replace(
        new RegExp('<div class="home-card-num">'+(i+1)+'</div>'),
        '<div class="home-card-num">'+ic(lessonIcons[i])+'</div>'
      );
    }
    // Replace Start (S), FAQ (F), Safety (!)
    html = html.replace('<div class="home-card-num">S</div>','<div class="home-card-num">'+ic('compass')+'</div>');
    html = html.replace('<div class="home-card-num">F</div>','<div class="home-card-num">'+ic('faq')+'</div>');
    html = html.replace('<div class="home-card-num">!</div>','<div class="home-card-num">'+ic('shield')+'</div>');

    // Replace emoji in roadmap heading
    html = html.replace(/📚\s*/g, ic('map')+' ');

    html = html.replace(/<span class="lang-notice-icon">🌍<\/span>/g, '<span class="lang-notice-icon">'+ic('globe')+'</span>');

    html = html.replace(/<div class="continue-icon"><svg/g, '<div class="continue-icon">'+ic('play')+'<svg style="display:none"');

    // Add icons to each roadmap-card
    for(var r=0;r<5;r++){

        new RegExp('<div class="roadmap-card" onclick="showLesson\\('+r+'\\)">'),
        '<div class="roadmap-card" onclick="showLesson('+r+')">'+ic(lessonIcons[r])
      );
    }

    // Add icons to mistake summary cards
    html = html.replace(/<div class="mistake-summary-card">/g, (function(){
      var idx = 0;
      return function(match){
        var icon = mistakeCardIcons[idx] || 'alert';

  // Terms to scan for (case-insensitive match in rendered HTML text)
  var termsList = ['seed phrase','private key','public key','gas fee','explorer','smart contract','custody','bridge','defi','stablecoin','nft','governance'];

  function getTooltipDefs(){ return tooltipDefs[currentLang] || tooltipDefs.en; }

  function applyTooltips(html){
    var defs = getTooltipDefs();
    // Sort terms by length (longest first) to avoid partial matches
    var sorted = termsList.slice().sort(function(a,b){return b.length - a.length;});
    sorted.forEach(function(term){
      var def = defs[term];
      if(!def) return;
      // Case-insensitive replace, but only in text nodes (avoid replacing inside tags/attributes)
      // Use a regex that avoids matches inside HTML tags or already-wrapped tooltips
      var escaped = term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      var re = new RegExp('(?<![\\w-])(' + escaped + ')(?![\\w-])(?![^<]*>)(?![^<]*<\\/span)','gi');
      var replaced = false;
      html = html.replace(re, function(match){
        if(replaced) return match; // Only replace first occurrence per term
        replaced = true;
        return '<span class="term-tip" onclick="this.classList.toggle(\'tip-active\')">' + match + '<span class="tip-box">' + def + '</span></span>';
      });
    });
    return html;
  }

  // Patch renderLesson to apply tooltips
  var __rlTip = window.renderLesson;
  window.renderLesson = function(i){
    var html = __rlTip(i);
    return applyTooltips(html);
  };

  // Patch renderSafetyPage

  function renderEnhancedQuiz(lessonIdx){
    var qd = quizData[currentLang] || quizData.en;
    var items = qd[lessonIdx];
    if(!items || !items.length) return '';
    var title = quizTitles[currentLang] || quizTitles.en;
    var html = '<div class="quiz-enhanced"><div class="quiz-e-title">'+title+'</div>';
    items.forEach(function(item, qi){
      var uid = 'eq_'+lessonIdx+'_'+qi+'_'+Math.random().toString(36).substr(2,5);
      html += '<div class="quiz-e-question">'+item.q+'</div><div class="quiz-e-options" id="'+uid+'">';
      item.opts.forEach(function(opt, oi){
        html += '<div class="quiz-e-opt" data-correct="'+(oi===item.correct?'1':'0')+'" onclick="handleQuizClick(this,\''+uid+'\','+item.correct+',\''+uid+'_fb\')"><div class="quiz-e-dot"></div><span>'+opt+'</span></div>';
      });
      html += '</div><div class="quiz-e-feedback" id="'+uid+'_fb">'+item.fb+'</div>';
    });
    html += '</div>';
    return html;
  }

  // Global quiz click handler
  window.handleQuizClick = function(el, containerId, correctIdx, fbId){
    var container = document.getElementById(containerId);
    if(!container) return;
    var opts = container.querySelectorAll('.quiz-e-opt');
    var isCorrect = el.getAttribute('data-correct') === '1';
    opts.forEach(function(o){ o.classList.add('disabled'); });
    el.classList.add(isCorrect ? 'correct' : 'wrong');
    // Also highlight correct answer
    if(!isCorrect) opts[correctIdx].classList.add('correct');
    var fb = document.getElementById(fbId);
    if(fb){
      fb.classList.add('show', isCorrect ? 'correct-fb' : 'wrong-fb');
      if(!isCorrect) fb.textContent = (currentLang==='ko'?'아쉽습니다! ':'') + fb.textContent;
    }
  };

      var eqHtml = renderEnhancedQuiz(i);
      html = html.substring(0, completeIdx) + eqHtml + html.substring(completeIdx);
