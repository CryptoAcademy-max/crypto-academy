<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coin ProofPath | Redirecting</title>
  <meta name="robots" content="noindex">
  <script>
    (function () {
      var repoBase = "/crypto-academy/";
      var path = window.location.pathname || "";
      var base = path.indexOf(repoBase) === 0 ? repoBase : "/";
      var hash = "";
      var lesson = path.match(/\/lessons?\/lesson[-\/]?(\d+)\/?$/i);

      if (lesson) {
        hash = "#lesson-" + lesson[1];
      } else if (/\/lessons?\/?$/i.test(path)) {
        hash = "#lessons";
      }

      window.location.replace(base + hash);
    })();
  </script>
</head>
<body>
  <p>Redirecting to Coin ProofPath...</p>
</body>
</html>
